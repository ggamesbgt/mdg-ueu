<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Citizen Dashboard - ID 19684</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        .device-info { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 24px; border: 1px solid #e1e4e8; }
        .device-info h2 { margin-top: 0; color: #0056b3; font-size: 1.5rem; }
        .status-online { background: #e6f4ea; color: #137333; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .status-offline { background: #fce8e6; color: #c5221f; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        p { margin: 8px 0; font-size: 0.95rem; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; table-layout: fixed; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #f0f2f5; word-wrap: break-word; }
        th { background-color: #0056b3; color: white; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8f9fa; }
        .loading { font-style: italic; color: #666; text-align: center; padding: 30px; }
        .sensor-desc { font-size: 0.85rem; color: #666; margin-top: 4px; font-weight: normal; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="device-info">
            <h2 id="dev-name">Memuat Data Perangkat...</h2>
            <p><strong>Status:</strong> <span id="dev-state">-</span></p>
            <p><strong>Pembaruan Terakhir:</strong> <span id="dev-time">-</span></p>
        </div>

        <table>
            <colgroup>
                <col style="width: 35%;">
                <col style="width: 15%;">
                <col style="width: 15%;">
                <col style="width: 35%;">
            </colgroup>
            <thead>
                <tr>
                    <th>Nama Sensor</th>
                    <th>Nilai</th>
                    <th>Satuan</th>
                    <th>Deskripsi Variabel (Measurement)</th>
                </tr>
            </thead>
            <tbody id="sensor-table-body">
                <tr>
                    <td colspan="4" class="loading">Sedang mengambil data sensor real-time...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Menggunakan alur fallback multi-proxy untuk memastikan CORS tertembus dari GitHub Pages
        const rawApiUrl = 'https://smartcitizen.me';
        const proxyUrl1 = `https://corsproxy.io{encodeURIComponent(rawApiUrl)}`;
        const proxyUrl2 = `https://allorigins.win{encodeURIComponent(rawApiUrl)}`;

        function loadDashboard() {
            // Pertama, coba gunakan corsproxy.io yang paling stabil
            fetch(proxyUrl1)
                .then(res => { if (!res.ok) throw new Error(); return res.json(); })
                .then(json => renderData(json))
                .catch(() => {
                    console.warn("Gagal memuat lewat proxy utama, mencoba proxy cadangan...");
                    // Kedua, coba gunakan allorigins jika proxy pertama gagal
                    fetch(proxyUrl2)
                        .then(res => { if (!res.ok) throw new Error(); return res.json(); })
                        .then(json => renderData(json))
                        .catch(err => {
                            console.error("Semua koneksi gagal", err);
                            document.getElementById('sensor-table-body').innerHTML = 
                                `<tr><td colspan="4" style="color:red; text-align:center; padding:20px;">
                                Gagal memuat data dari API. Server Smart Citizen sedang sibuk atau ID perangkat tidak valid.
                                </td></tr>`;
                        });
                });
        }

        function renderData(json) {
            // 1. Isi Metadata Perangkat sesuai skema API
            document.getElementById('dev-name').innerText = json.name || "Smart Citizen Device (ID 19684)";
            
            const stateEl = document.getElementById('dev-state');
            const isOnline = json.state === 'online' || json.state === 'has_published';
            stateEl.innerText = json.state ? json.state.toUpperCase() : 'UNKNOWN';
            stateEl.className = isOnline ? 'status-online' : 'status-offline';
            
            if (json.last_recorded_at) {
                const lastUpdate = new Date(json.last_recorded_at);
                document.getElementById('dev-time').innerText = lastUpdate.toLocaleString('id-ID');
            } else {
                document.getElementById('dev-time').innerText = "Tidak ada rekaman waktu baru";
            }

            // 2. Isi Tabel Sensor & Ekstraksi Measurement Objek sesuai artikel dokumentasi
            const tableBody = document.getElementById('sensor-table-body');
            tableBody.innerHTML = ''; 

            const sensors = (json.data && json.data.sensors) ? json.data.sensors : (json.sensors || []);

            if (sensors.length > 0) {
                sensors.forEach(sensor => {
                    const row = document.createElement('tr');
                    
                    // Format Nilai Angka
                    const valueFormatted = typeof sensor.value === 'number' ? sensor.value.toFixed(2) : (sensor.value ?? '-');
                    
                    // Ekstraksi info dari properti 'measurement' atau 'description' bawaan skema sensor
                    let measurementDesc = "-";
                    if (sensor.measurement && sensor.measurement.description) {
                        measurementDesc = sensor.measurement.description;
                    } else if (sensor.description) {
                        measurementDesc = sensor.description;
                    }

                    // Tentukan tanda label jika sensor merupakan sub-sensor (punya parent_id)
                    const sensorNamePrefix = sensor.parent_id ? `↳ ${sensor.name}` : sensor.name;

                    row.innerHTML = `
                        <td>
                            <strong>${sensorNamePrefix || 'Sensor'}</strong>
                            <span class="sensor-desc">ID Sensor: ${sensor.id || '-'}</span>
                        </td>
                        <td>${valueFormatted}</td>
                        <td><code>${sensor.unit || '-'}</code></td>
                        <td style="font-size: 0.9rem; color: #555;">${measurementDesc}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } else {
                tableBody.innerHTML = '<tr><td colspan="4" class="loading">Data komponen daftar sensor kosong saat ini.</td></tr>';
            }
        }

        // Jalankan pemanggilan data otomatis saat halaman selesai dimuat
        window.onload = loadDashboard;
    </script>

</body>
</html>
