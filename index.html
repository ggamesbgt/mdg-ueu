<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasbor Sensor VS_KBNJERUK</title>
    <style>
        :root {
            --primary: #0056b3;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
            --text-muted: #666666;
            --border: #e1e4e8;
            --success: #137333;
            --success-bg: #e6f4ea;
            --error: #c5221f;
            --error-bg: #fce8e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        .header-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .header-card h1 {
            margin: 0 0 12px 0;
            color: var(--primary);
            font-size: 1.6rem;
            font-weight: 700;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            font-size: 0.95rem;
        }

        .meta-item strong {
            color: var(--text-muted);
            font-weight: 500;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .status-online { background-color: var(--success-bg); color: var(--success); }
        .status-offline { background-color: var(--error-bg); color: var(--error); }

        .table-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #fafbfc;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 14px 16px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8f9fa;
        }

        .sensor-name {
            font-weight: 600;
            color: #111;
        }

        .sensor-id {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
        }

        .sensor-value {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-weight: 700;
            font-size: 1.05rem;
            color: #000;
        }

        .sensor-unit {
            background-color: #f1f3f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 40px;
            font-style: italic;
            color: var(--text-muted);
        }

        .error-state {
            color: var(--error);
            font-weight: 500;
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            th, td { padding: 12px; }
            th:nth-child(4), td:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-card">
            <h1 id="dev-name">Menghubungkan ke API...</h1>
            <div class="meta-grid">
                <div class="meta-item"><strong>Status:</strong> <span id="dev-state" class="status-badge">-</span></div>
                <div class="meta-item"><strong>Pemilik:</strong> <span id="dev-owner">-</span></div>
                <div class="meta-item"><strong>Update:</strong> <span id="dev-time">-</span></div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 30%;">Nama Sensor</th>
                        <th style="width: 15%;">Nilai</th>
                        <th style="width: 15%;">Satuan</th>
                        <th style="width: 40%;">Keterangan Metrik</th>
                    </tr>
                </thead>
                <tbody id="sensor-table-body">
                    <tr>
                        <td colspan="4" class="loading-state">Sedang memproses data sensor real-time...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const deviceId = '19684';
        const targetUrl = `https://smartcitizen.me{deviceId}`;
        
        // Memakai proxy bypass alternatif yang didukung penuh oleh Cloudflare Worker gratis
        const proxyUrl = `https://allorigins.win{encodeURIComponent(targetUrl)}`;

        function fetchSensorData() {
            fetch(proxyUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Proxy Gagal Merespon');
                    return response.json();
                })
                .then(data => {
                    updateMetadata(data);
                    renderTableRows(data);
                })
                .catch(error => {
                    console.error('Error saat fetch data:', error);
                    
                    // JALUR DARURAT: Jika proxy pertama gagal, coba tembak langsung tanpa proxy (beberapa browser modern mengizinkannya)
                    fetch(targetUrl)
                        .then(res => res.json())
                        .then(data => {
                            updateMetadata(data);
                            renderTableRows(data);
                        })
                        .catch(() => {
                            document.getElementById('sensor-table-body').innerHTML = `
                                <tr>
                                    <td colspan="4" class="error-state">
                                        ⚠️ Gagal memuat data otomatis. Silakan coba muat ulang halaman (Refresh) browser Anda.
                                    </td>
                                </tr>
                            `;
                        });
                });
        }

        function updateMetadata(json) {
            document.getElementById('dev-name').innerText = json.name || `Perangkat #${deviceId}`;
            document.getElementById('dev-owner').innerText = (json.owner && json.owner.username) ? json.owner.username : 'Vina Sandriana';
            
            const stateEl = document.getElementById('dev-state');
            const isOnline = json.state === 'online' || json.state === 'has_published';
            stateEl.innerText = isOnline ? 'ONLINE' : 'OFFLINE';
            stateEl.className = `status-badge ${isOnline ? 'status-online' : 'status-offline'}`;
            
            if (json.last_recorded_at) {
                const lastUpdate = new Date(json.last_recorded_at);
                document.getElementById('dev-time').innerText = lastUpdate.toLocaleString('id-ID');
            } else {
                document.getElementById('dev-time').innerText = '-';
            }
        }

        function renderTableRows(json) {
            const tableBody = document.getElementById('sensor-table-body');
            tableBody.innerHTML = ''; 

            const sensors = (json.data && json.data.sensors) ? json.data.sensors : (json.sensors || []);

            if (sensors.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" class="loading-state">Tidak ada komponen sensor aktif ditemukan.</td></tr>';
                return;
            }

            sensors.forEach(sensor => {
                const row = document.createElement('tr');
                const valueFormatted = typeof sensor.value === 'number' ? sensor.value.toFixed(2) : (sensor.value ?? '-');
                const descriptionText = (sensor.measurement && sensor.measurement.description) 
                    ? sensor.measurement.description 
                    : (sensor.description || '-');

                row.innerHTML = `
                    <td>
                        <span class="sensor-name">${sensor.name || 'Sensor'}</span>
                        <span class="sensor-id">ID: ${sensor.id || '-'}</span>
                    </td>
                    <td><span class="sensor-value">${valueFormatted}</span></td>
                    <td><span class="sensor-unit">${sensor.unit || '-'}</span></td>
                    <td style="color: var(--text-muted); font-size: 0.88rem;">${descriptionText}</td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', fetchSensorData);
    </script>
</body>
</html>
